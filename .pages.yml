media:
  input: public/images
  output: /images

content:
  - name: topics
    label: Topics
    type: collection
    path: src/content/topics
    extension: json
    format: json
    filename: "{fields.label | slugify}.json"
    view:
      fields: [label]
      primary: label
      sort: [label]
    fields:
      - { name: label, label: Label, type: string, required: true, hint: "e.g. Machine learning" }
      - {
          name: tags,
          label: Tags in this topic,
          type: string,
          list: true,
          hint: "Tags that belong here. A tag can be added to multiple topics.",
        }

  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    extension: mdx
    format: yaml-frontmatter
    filename: "{fields.title | slugify}.mdx"
    view:
      fields: [title, date, draft]
      primary: title
      sort: [date]
      default:
        sort: date
        order: desc
    fields:
      - { name: title, label: Title, type: string, required: true }
      - {
          name: date,
          label: Date,
          type: date,
          required: true,
          options: { format: "yyyy-MM-dd" },
          default: now,
        }
      - { name: description, label: Description, type: string }
      - { name: readTime, label: Read time, type: string }
      - {
          name: tags,
          label: Tags,
          type: string,
          list: true,
          hint: "Press enter after each tag. e.g. machine-learning, transformers, notes",
        }
      - { name: draft, label: Draft, type: boolean, default: false }
      - {
          name: mini,
          label: "Mini blog (explainer)",
          type: boolean,
          default: false,
          hint: "Hidden from homepage, tags index, and RSS. Reachable only via inline <Explain> links.",
        }
      - {
          name: body,
          label: Body,
          type: code,
          options: { language: markdown },
          required: true,
          hint: "Markdown + MDX. Use <Explain slug='...'>term</Explain>, <Callout>, <YouTube id='...' />, $math$, etc.",
        }
